<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  ::selection { background: rgba(23,155,142,.22); }
  [data-admin-input]:focus { border-color: var(--c-accent) !important; background: #fff !important; box-shadow: 0 0 0 3px rgba(20,155,142,.12) !important; }
  [data-k]:hover { background: rgba(255,255,255,.07) !important; }

  /* responsive-dash */
  @media (max-width: 900px){
    [data-app-root]{ flex-direction:column !important; }
    [data-app-side]{ width:100% !important; height:auto !important; position:relative !important; flex-direction:row !important; overflow-x:auto !important; align-items:center; }
    [data-app-side] [data-nav]{ flex-direction:row !important; gap:4px !important; flex-wrap:nowrap; }
    [data-app-side] [data-nav] span{ white-space:nowrap; }
    [data-app-side] [data-nav] [data-sec]{ display:none !important; }
    [data-app-main]{ overflow-x:auto !important; }
    [data-sidefoot]{ display:none !important; }
    [style*="grid-template-columns: repeat"]{ grid-template-columns:repeat(2,1fr) !important; }
  }
  @media (max-width: 760px){
    [style*="1.6fr 1fr"],[style*="1.3fr 1fr"],[style*="1.2fr 1fr"],[style*="1.45fr 1fr"],[style*="1.35fr 1fr"]{ grid-template-columns:1fr !important; }
    [data-searchbox]{ display:none !important; }
    [style*="display: grid"][style*="border-bottom: 1px solid var(--c-line)"]{ min-width:660px !important; }
  }
  @media (max-width: 560px){
    [style*="grid-template-columns: repeat"]{ grid-template-columns:repeat(2,1fr) !important; }
    [style*="font-size: 26px"]{ font-size:21px !important; }
  }
</style>

      const header = n.sec ? `<div data-sec style="font-family:'JetBrains Mono',monospace; font-size:8.5px; letter-spacing:.13em; text-transform:uppercase; color:rgba(159,176,231,.55); padding:14px 12px 5px;">${n.sec}</div>` : '';
      return `${header}<span data-k="${n.k}" style="cursor:pointer; position:relative; display:flex; align-items:center; gap:11px; font-size:13px; font-weight:${on ? '600' : '500'}; color:${on ? '#fff' : 'rgba(255,255,255,.6)'}; padding:9px 12px; border-radius:11px; background:${on ? 'rgba(255,255,255,.12)' : 'transparent'}; box-shadow:${on ? 'inset 0 0 0 1px rgba(255,255,255,.06)' : 'none'};">${on ? '<span style="position:absolute; left:1px; top:50%; transform:translateY(-50%); width:3px; height:18px; border-radius:2px; background:var(--c-accent);"></span>' : ''}<span style="width:20px; text-align:center; font-size:13px;">${ic}</span>${n.t}${badge}${tag}</span>`;
    }).join('');

  }

  // ---------- helpers ----------
  card(inner, pad) { return `<div style="background:var(--glass-bg); border:1px solid var(--glass-brd); border-radius:20px; padding:${pad == null ? 22 : pad}px; backdrop-filter:blur(16px) saturate(1.4); box-shadow:0 12px 34px rgba(34,36,90,.08), inset 0 1px 0 rgba(255,255,255,.6);">${inner}</div>`; }
  kpi(label, val, badge, sub) {
    const down = badge && String(badge).indexOf('↓') > -1;
    const bc = down ? '#c0413c' : '#1a8f5a';
    const bbg = down ? 'rgba(224,82,77,.12)' : 'rgba(31,170,107,.12)';
    return `<div style="position:relative; overflow:hidden; background:var(--glass-bg); border:1px solid var(--glass-brd); border-radius:18px; padding:20px; backdrop-filter:blur(16px) saturate(1.4); box-shadow:0 12px 34px rgba(34,36,90,.08), inset 0 1px 0 rgba(255,255,255,.6);"><div style="position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg,var(--c-indigo),var(--c-accent));"></div><div style="font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--c-muted); margin-bottom:12px;">${label}</div><div style="font-size:30px; font-weight:800; letter-spacing:-.02em;">${val}</div><div style="display:flex; align-items:center; gap:6px; margin-top:8px;">${badge ? `<span style="font-size:11px; font-weight:700; color:${bc}; background:${bbg}; padding:2px 8px; border-radius:999px;">${badge}</span>` : ''}<span style="font-size:11px; color:var(--c-muted);">${sub || ''}</span></div></div>`;
  }
  badge(s) {
    const m = { Live: ['#1a8f5a', 'rgba(31,170,107,.12)'], Draft: ['#b5801e', 'rgba(224,163,59,.16)'], New: ['#2a2b6a', 'rgba(42,43,106,.1)'], 'Follow-up': ['#b5801e', 'rgba(224,163,59,.16)'], Won: ['#1a8f5a', 'rgba(31,170,107,.12)'], Approved: ['#1a8f5a', 'rgba(31,170,107,.12)'], 'Pending review': ['#b5801e', 'rgba(224,163,59,.16)'], Points: ['#2a2b6a', 'rgba(42,43,106,.1)'], Coupon: ['#149b8e', 'rgba(23,155,142,.12)'], Sent: ['#127d72', 'rgba(23,155,142,.12)'], Rejected: ['#c0413c', 'rgba(224,82,77,.14)'], Blocked: ['#c0413c', 'rgba(224,82,77,.14)'], 'In review': ['#b5801e', 'rgba(224,163,59,.16)'], 'Changes requested': ['#c0413c', 'rgba(224,82,77,.12)'], Pending: ['#b5801e', 'rgba(224,163,59,.16)'], 'In Progress': ['#b5801e', 'rgba(224,163,59,.16)'], Quoted: ['#127d72', 'rgba(23,155,142,.12)'], Closed: ['#5b5d7a', 'rgba(91,93,122,.12)'] };
    const [c, bg] = m[s] || m.New;
    return `<span style="font-size:11px; font-weight:700; color:${c}; background:${bg}; padding:4px 11px; border-radius:999px; white-space:nowrap;">${s}</span>`;
  }
  pill(t, on) { return `<span style="font-size:11px; font-weight:700; color:${on ? '#1a8f5a' : 'var(--c-muted)'}; background:${on ? 'rgba(31,170,107,.12)' : 'rgba(91,93,122,.1)'}; padding:4px 11px; border-radius:999px;">${on ? 'Active' : 'Hidden'}</span>`; }
  thumb(t) { const bg = t === 't' ? 'repeating-linear-gradient(135deg,rgba(23,155,142,.07) 0 8px,rgba(23,155,142,.02) 8px 16px),linear-gradient(135deg,#e3efed,#daece9)' : 'repeating-linear-gradient(135deg,rgba(42,43,106,.06) 0 8px,rgba(42,43,106,.02) 8px 16px),linear-gradient(135deg,#e6eaf6,#dde2f1)'; return `<span style="width:40px; height:40px; flex:none; border-radius:10px; background:${bg};"></span>`; }
  setPrimary(label, fn) {
    const b = this.wrap.querySelector('[data-primary]');
    if (!label) { b.style.display = 'none'; return; }
    b.style.display = 'flex'; b.textContent = '+ ' + label;
    b.onclick = fn;
  }

  renderView() {
    const [title, sub] = this.titles[this.view];
    this.wrap.querySelector('[data-title]').textContent = title;
    this.wrap.querySelector('[data-sub]').textContent = sub;

    return kpis + `<div style="display:grid; grid-template-columns:1.6fr 1fr; gap:16px;">${chart}${activity}</div>`;

  after_products() {
    this.setPrimary('Add Product', () => this.openForm('Add product', [['name', 'Product name', ''], ['cat', 'Category', ''], ['price', 'Price ₹', ''], ['moq', 'MOQ', '']], (vals) => {
      this.data.products.push({ name: vals.name || 'New product', cat: vals.cat || 'Uncategorised', price: +vals.price || 0, moq: +vals.moq || 50, status: 'Draft' });
      this.renderView();
    }));
    const host = this.wrap.querySelector('[data-view]');
    host.querySelectorAll('[data-chk]').forEach((c) => c.addEventListener('click', () => {
      const on = c.getAttribute('data-on') === '1';
      c.setAttribute('data-on', on ? '0' : '1');
      c.style.background = on ? '#fff' : 'var(--c-accent)'; c.style.borderColor = on ? 'var(--c-line)' : 'var(--c-accent)';
    }));
    host.querySelectorAll('[data-del]').forEach((b) => b.addEventListener('click', () => { this.data.products.splice(+b.getAttribute('data-del'), 1); this.renderView(); }));
    host.querySelectorAll('[data-edit]').forEach((b) => b.addEventListener('click', () => {
      const i = +b.getAttribute('data-edit'); const p = this.data.products[i];
      this.openForm('Edit product', [['name', 'Product name', p.name], ['cat', 'Category', p.cat], ['price', 'Price ₹', p.price], ['moq', 'MOQ', p.moq]], (vals) => {
        Object.assign(p, { name: vals.name, cat: vals.cat, price: +vals.price, moq: +vals.moq }); this.renderView();
      });
    }));

    const recs = host.querySelector('[data-recs]'); if (recs) recs.addEventListener('click', () => { recs.textContent = '✓ Recompute queued'; setTimeout(() => { recs.textContent = '✦ Recommendations'; }, 1300); });
  }

  // ---------- QUOTATIONS ----------
  resetModalCard() {
    const card = this.wrap.querySelector('[data-modal-card]');
    if (card) { card.style.width = '520px'; card.style.maxWidth = '100%'; card.style.height = 'auto'; }
    const body = this.wrap.querySelector('[data-modal-body]');
    if (body) { body.style.padding = '24px'; body.style.gap = '14px'; }
  }
  get role() { return this.props.role || 'Super Admin'; }
  roleCaps() { const r = this.role; return { approve: r === 'Super Admin', edit: r === 'Super Admin' || r === 'Admin', access: r === 'Super Admin' || r === 'Admin' }; }
  quoteTotal(q) { const sub = q.items.reduce((a, it) => a + (+it.qty || 0) * (+it.price || 0), 0); return Math.round(sub * (1 - (+q.disc || 0) / 100)); }
  granted(q) { return q.recipients.filter((r) => r.on).length; }
  toast(el, txt) { const o = el.textContent; el.textContent = txt; setTimeout(() => { el.textContent = o; }, 1100); }

  v_quotations() {
    const caps = this.roleCaps();
    const pending = this.data.quotations.filter((q) => q.status === 'Pending review').length;
    const chips = `<div style="display:grid; grid-template-columns:repeat(auto-fit,minmax(210px,auto)); align-items:start; gap:10px; margin-bottom:16px;">
      <div style="display:flex; align-items:center; gap:10px; padding:10px 14px; border-radius:12px; background:rgba(42,43,106,.06); border:1px solid rgba(42,43,106,.12);"><span style="width:30px; height:30px; flex:none; border-radius:9px; background:linear-gradient(135deg,#2a2b6a,#3a3c98); color:#fff; display:flex; align-items:center; justify-content:center; font-size:13px;">👤</span><div><div style="font-size:12.5px; font-weight:800;">Acting as ${this.role}</div><div style="font-size:11px; color:var(--c-muted);">${caps.approve ? 'Full approval rights · can release downloads' : caps.edit ? 'Can draft &amp; edit · approvals route to Super Admin' : 'Read-only · can view download history'}</div></div></div>
      ${pending ? `<div style="display:flex; align-items:center; gap:8px; padding:10px 14px; border-radius:12px; background:rgba(224,163,59,.12); border:1px solid rgba(224,163,59,.28);"><span style="font-size:13px;">⏳</span><span style="font-size:12.5px; font-weight:700; color:#b5801e;">${pending} awaiting approval</span></div>` : ''}
      <div style="display:flex; align-items:center; gap:8px; padding:10px 14px; border-radius:12px; background:rgba(23,155,142,.1); border:1px solid rgba(23,155,142,.22);"><span style="font-size:13px;">🔒</span><span style="font-size:12.5px; font-weight:700; color:#127d72;">Downloads locked until approved</span></div>
    </div>`;
    const cols = 'grid-template-columns:.85fr 1.3fr .5fr .9fr 1fr .95fr 1.5fr';
    const head = `<div style="display:grid; ${cols}; gap:12px; padding:0 14px 12px; border-bottom:1px solid var(--c-line); font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:.05em; text-transform:uppercase; color:var(--c-muted);"><span>Quote #</span><span>Company</span><span>Items</span><span>Total</span><span>Status</span><span>Access</span><span></span></div>`;
    const rows = this.data.quotations.map((q, i) => {
      const g = this.granted(q);
      const unlocked = (q.status === 'Approved' || q.status === 'Sent') && g > 0;
      const access = g
        ? `<span data-qaccess="${i}" style="cursor:pointer; font-size:11px; font-weight:600; color:var(--c-indigo); padding:6px 10px; border-radius:8px; background:rgba(42,43,106,.07);">${g} can download</span>`
        : `<span data-qaccess="${i}" style="cursor:pointer; font-size:11px; font-weight:700; color:#b5801e; padding:6px 10px; border-radius:8px; background:rgba(224,163,59,.14);">🔒 Locked</span>`;
      return `<div style="display:grid; ${cols}; gap:12px; padding:14px; border-bottom:1px solid var(--c-line); align-items:center; font-size:13px;">
        <span style="font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:600; color:var(--c-slate);">${q.id}</span>
        <span><strong>${q.co}</strong><div style="font-size:11px; color:var(--c-muted); margin-top:2px;">by ${q.by}</div></span>
        <span style="color:var(--c-slate);">${q.items.length}</span>
        <span style="font-weight:800;">₹ ${this.quoteTotal(q).toLocaleString('en-IN')}</span>
        <span>${this.badge(q.status)}</span>
        <span>${access}</span>
        <span style="display:flex; gap:6px; justify-content:flex-end; flex-wrap:wrap;">${this.quoteActions(q, i, caps, unlocked)}</span>
      </div>`;
    }).join('');
    return `<div style="display:flex; flex-direction:column; gap:16px;">${chips}${this.card(head + `<div data-qlist>${rows}</div>`)}</div>`;
  }
  quoteActions(q, i, caps, unlocked) {
    const A = [];
    const chip = (attr, txt, bg, col) => `<span ${attr} style="cursor:pointer; font-size:11px; font-weight:600; color:${col}; padding:6px 10px; border-radius:8px; background:${bg};">${txt}</span>`;
    if (caps.edit) A.push(chip(`data-qedit="${i}"`, '✎ Edit', 'rgba(42,43,106,.07)', 'var(--c-indigo)'));
    if (q.status === 'Draft' || q.status === 'Rejected') { if (caps.edit) A.push(chip(`data-qsubmit="${i}"`, 'Submit →', 'rgba(42,43,106,.07)', 'var(--c-indigo)')); }
    else if (q.status === 'Pending review') {
      if (caps.approve) { A.push(chip(`data-qok="${i}"`, '✓ Approve', 'var(--c-accent)', '#fff')); A.push(chip(`data-qno="${i}"`, 'Reject', 'rgba(224,82,77,.12)', '#c0413c')); }
      else A.push(`<span style="font-size:11px; font-weight:600; color:#b5801e; padding:6px 10px; border-radius:8px; background:rgba(224,163,59,.12);">Awaiting Super Admin</span>`);
    } else if (q.status === 'Approved') A.push(chip(`data-qsend="${i}"`, 'Send →', 'rgba(23,155,142,.12)', '#127d72'));
    else if (q.status === 'Sent') A.push(chip(`data-qsend="${i}"`, 'Resend', 'rgba(42,43,106,.07)', 'var(--c-indigo)'));
    if (unlocked) A.push(chip(`data-qdl="${i}"`, '↓ PDF', 'linear-gradient(135deg,#2a2b6a,#3a3c98)', '#fff'));
    else A.push(`<span title="Download unlocks after Super Admin approval and granted access" style="font-size:11px; font-weight:600; color:var(--c-muted); padding:6px 10px; border-radius:8px; background:rgba(91,93,122,.08);">🔒 PDF</span>`);
    return A.join('');
  }
  after_quotations() {
    if (this.roleCaps().edit) this.setPrimary('New Quotation', () => this.openQuoteEditor(null)); else this.setPrimary(null);
    const host = this.wrap.querySelector('[data-view]');
    host.querySelectorAll('[data-qedit]').forEach((b) => b.addEventListener('click', () => this.openQuoteEditor(+b.getAttribute('data-qedit'))));
    host.querySelectorAll('[data-qsubmit]').forEach((b) => b.addEventListener('click', () => { this.data.quotations[+b.getAttribute('data-qsubmit')].status = 'Pending review'; this.renderView(); }));
    host.querySelectorAll('[data-qok]').forEach((b) => b.addEventListener('click', () => { this.data.quotations[+b.getAttribute('data-qok')].status = 'Approved'; this.renderView(); }));
    host.querySelectorAll('[data-qno]').forEach((b) => b.addEventListener('click', () => { this.data.quotations[+b.getAttribute('data-qno')].status = 'Rejected'; this.renderView(); }));
    host.querySelectorAll('[data-qsend]').forEach((b) => b.addEventListener('click', () => { this.data.quotations[+b.getAttribute('data-qsend')].status = 'Sent'; this.renderView(); }));
    host.querySelectorAll('[data-qaccess]').forEach((b) => b.addEventListener('click', () => this.openAccess(+b.getAttribute('data-qaccess'))));
    host.querySelectorAll('[data-qdl]').forEach((b) => b.addEventListener('click', () => { const q = this.data.quotations[+b.getAttribute('data-qdl')]; q.downloads.unshift({ who: this.role + ' (you)', when: 'just now' }); this.toast(b, '✓ Downloaded'); }));
  }
  openQuoteEditor(idx) {
    const isNew = idx == null;
    const q = isNew
      ? { id: 'QT-' + (2050 + this.data.quotations.length), co: '', contact: '', email: '', phone: '', delivery: '', notes: '', by: this.role, status: 'Draft', disc: 0, terms: '50% advance · balance on delivery', recipients: [], downloads: [], items: [] }
      : JSON.parse(JSON.stringify(this.data.quotations[idx]));
    ['contact', 'email', 'phone', 'delivery', 'notes'].forEach((k) => { if (q[k] == null) q[k] = ''; });
    if (q.theme == null) q.theme = 0;
    if (q.logo == null) q.logo = '';
    const quoteThemes = [
      { name: 'Navy & Teal', h: ['#2a2b6a', '#3a3c98'], a: '#149b8e' },
      { name: 'Midnight Gold', h: ['#1a1a2e', '#2d2d4e'], a: '#b0823a' },
      { name: 'Deep Indigo', h: ['#1e1b4b', '#312e81'], a: '#4143b0' },
      { name: 'Forest', h: ['#1a3329', '#2d5a46'], a: '#5a7c3a' },
    ];
    const caps = this.roleCaps();
    const wasApproved = !isNew && (this.data.quotations[idx].status === 'Approved' || this.data.quotations[idx].status === 'Sent');
    const modal = this.wrap.querySelector('[data-modal]');
    const card = modal.querySelector('[data-modal-card]');
    card.style.width = '1100px'; card.style.maxWidth = '96vw'; card.style.height = '90vh';
    modal.querySelector('[data-modal-title]').textContent = isNew ? 'Generate quotation' : 'Edit ' + q.id;
    const body = modal.querySelector('[data-modal-body]');
    body.style.padding = '0'; body.style.gap = '0';
    const IN = 'height:38px; padding:0 12px; font-family:inherit; font-size:13px; border-radius:9px; background:#fff; border:1px solid var(--c-line); outline:none; width:100%;';
    const esc = (s) => (s == null ? '' : String(s)).replace(/"/g, '&quot;');
    let search = '', activeCat = 'All';
    const cats = ['All', ...Array.from(new Set(this.data.products.map((p) => p.cat)))];

    const recalc = () => {
      q.items.forEach((it, j) => { const el = body.querySelector(`[data-qline="${j}"]`); if (el) el.textContent = '₹ ' + ((+it.qty || 0) * (+it.price || 0)).toLocaleString('en-IN'); });
      const t = body.querySelector('[data-qtotal]'); if (t) t.textContent = '₹ ' + this.quoteTotal(q).toLocaleString('en-IN');
      const dl = body.querySelector('[data-disclabel]'); if (dl) dl.innerHTML = q.disc ? ` <span style="font-weight:500; color:var(--c-muted);">(${q.disc}% off)</span>` : '';
    };

    const catalogCards = () => {
      const filtered = this.data.products.filter((p) => (activeCat === 'All' || p.cat === activeCat) && (!search || (p.name + ' ' + p.cat + ' ' + (p.desc || '')).toLowerCase().includes(search.toLowerCase())));
      if (!filtered.length) return `<div style="grid-column:1/-1; padding:40px 20px; text-align:center; color:var(--c-muted); font-size:13px;">No products match your search.</div>`;
      return filtered.map((p) => {
        const pi = this.data.products.indexOf(p);
        const inQuote = q.items.findIndex((it) => it._pid === pi) > -1;
        return `<div style="background:#fff; border:1px solid var(--c-line); border-radius:13px; overflow:hidden; display:flex; flex-direction:column;">
          <div style="height:104px; background:#eef0f8 url('assets/img/${p.img}.png') center/cover no-repeat; position:relative;">${p.status === 'Draft' ? '<span style="position:absolute; top:8px; left:8px; font-size:9px; font-weight:700; color:#b5801e; background:rgba(255,255,255,.92); padding:2px 7px; border-radius:6px;">Draft</span>' : ''}</div>
          <div style="padding:10px 12px 12px; display:flex; flex-direction:column; flex:1;">
            <div style="font-family:'JetBrains Mono',monospace; font-size:9px; text-transform:uppercase; letter-spacing:.05em; color:var(--c-accent); margin-bottom:3px;">${p.cat}</div>
            <div style="font-size:13px; font-weight:700; line-height:1.25; margin-bottom:4px;">${p.name}</div>
            <div style="font-size:11px; color:var(--c-muted); line-height:1.4; margin-bottom:9px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;">${p.desc || ''}</div>
            <div style="font-size:10px; color:var(--c-slate); margin-bottom:10px;">${p.material || ''}${p.colors ? ' · ' + p.colors : ''}</div>
            <div style="margin-top:auto; display:flex; align-items:center; justify-content:space-between; gap:8px;">
              <div style="white-space:nowrap;"><span style="font-size:15px; font-weight:800;">₹ ${p.price}</span><span style="font-size:10px; color:var(--c-muted); margin-left:4px;">MOQ ${p.moq}</span></div>
              ${inQuote
                ? `<span style="font-size:11px; font-weight:700; color:var(--c-accent); white-space:nowrap;">In quote ✓</span>`
                : `<span data-padd="${pi}" style="cursor:pointer; font-size:11px; font-weight:700; color:#fff; padding:7px 13px; border-radius:9px; background:linear-gradient(135deg,#2a2b6a,#3a3c98); white-space:nowrap;">+ Add</span>`}
            </div>
          </div>
        </div>`;
      }).join('');
    };

    const renderLeft = () => `
      <div style="display:flex; flex-direction:column; height:100%; background:rgba(245,246,251,.6); border-right:1px solid var(--c-line); min-width:0;">
        <div style="padding:16px 18px 12px; background:#fff; border-bottom:1px solid var(--c-line);">
          <div style="font-size:12px; font-weight:800; text-transform:uppercase; letter-spacing:.05em; margin-bottom:10px;">Product catalogue <span style="font-weight:500; color:var(--c-muted); text-transform:none; letter-spacing:0;">· search &amp; add</span></div>
          <div style="display:flex; align-items:center; gap:9px; height:40px; padding:0 13px; border-radius:10px; background:rgba(245,246,251,.9); border:1px solid var(--c-line); margin-bottom:11px;">
            <span style="width:13px; height:13px; border:2px solid var(--c-muted); border-radius:50%; flex:none;"></span>
            <input data-psearch value="${esc(search)}" placeholder="Search by name, category or material…" style="border:none; background:transparent; outline:none; font-family:inherit; font-size:13px; width:100%;">
          </div>
          <div data-catchips style="display:flex; gap:7px; overflow-x:auto; padding-bottom:2px;">${cats.map((c) => `<span data-cat="${c}" style="cursor:pointer; font-size:11.5px; font-weight:600; white-space:nowrap; color:${c === activeCat ? '#fff' : 'var(--c-slate)'}; padding:6px 13px; border-radius:999px; background:${c === activeCat ? 'linear-gradient(135deg,#2a2b6a,#3a3c98)' : '#fff'}; border:1px solid ${c === activeCat ? 'transparent' : 'var(--c-line)'};">${c}</span>`).join('')}</div>
        </div>
        <div data-cards style="overflow-y:auto; flex:1; padding:14px 18px; display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:13px; align-content:start;">${catalogCards()}</div>
      </div>`;

    const itemRows = () => q.items.length ? q.items.map((it, j) => {
      const p = it._pid != null ? this.data.products[it._pid] : null;
      const img = `<div style="width:46px; height:46px; flex:none; border-radius:9px; background:#eef0f8 ${p ? `url('assets/img/${p.img}.png') center/cover no-repeat` : ''};"></div>`;
      return `<div style="display:flex; align-items:center; gap:11px; padding:11px 0; border-bottom:1px solid var(--c-line);">
        ${img}
        <div style="flex:1; min-width:0;">
          <div style="font-size:13px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${it.name}</div>
          <div style="display:flex; align-items:center; gap:8px; margin-top:6px; flex-wrap:wrap;">
            <span style="display:flex; align-items:center; background:#fff; border:1px solid var(--c-line); border-radius:8px;">
              <span data-qdec="${j}" style="cursor:pointer; width:24px; height:26px; display:flex; align-items:center; justify-content:center; color:var(--c-slate); font-size:15px;">−</span>
              <input data-qi-qty="${j}" value="${it.qty}" style="width:46px; height:26px; text-align:center; border:none; border-left:1px solid var(--c-line); border-right:1px solid var(--c-line); outline:none; font-family:inherit; font-size:12px; font-weight:600;">
              <span data-qinc="${j}" style="cursor:pointer; width:24px; height:26px; display:flex; align-items:center; justify-content:center; color:var(--c-slate); font-size:14px;">+</span>
            </span>
            <span style="font-size:11px; color:var(--c-muted);">×</span>
            ${caps.approve
              ? `<span style="display:flex; align-items:center; gap:1px; background:#fff; border:1px solid ${it._edited ? 'var(--c-indigo)' : 'var(--c-line)'}; border-radius:8px; padding:0 9px; height:26px;"><span style="font-size:11px; color:var(--c-muted);">₹</span><input data-qi-price="${j}" value="${it.price}" style="width:54px; height:24px; text-align:right; border:none; outline:none; font-family:inherit; font-size:12px; font-weight:700;"></span>`
              : `<span style="font-size:12px; font-weight:700;">₹ ${it.price}</span>`}
            <span data-qline="${j}" style="margin-left:auto; font-size:13px; font-weight:800; color:var(--c-indigo); white-space:nowrap;">₹ ${((+it.qty || 0) * (+it.price || 0)).toLocaleString('en-IN')}</span>
          </div>
        </div>
        <span data-qi-del="${j}" style="cursor:pointer; color:#d8524d; font-size:13px; flex:none;">✕</span>
      </div>`;
    }).join('') : `<div style="padding:34px 16px; text-align:center; color:var(--c-muted); font-size:13px; line-height:1.7;">No items in this quotation yet.<br><span style="font-size:12px;">Search products on the left and tap <strong style="color:var(--c-indigo);">+ Add</strong>.</span></div>`;

    const field = (label, key, ph, full) => `<div style="${full ? 'grid-column:1/-1;' : ''}"><div style="font-size:11px; font-weight:600; color:var(--c-slate); margin-bottom:5px;">${label}</div><input data-qf="${key}" value="${esc(q[key])}" placeholder="${ph}" style="${IN}"></div>`;

    const renderRight = () => `
      <div style="display:flex; flex-direction:column; height:100%; background:#fff; min-width:0;">
        <div style="overflow-y:auto; flex:1; padding:16px 18px;">
          <div style="font-size:12px; font-weight:800; text-transform:uppercase; letter-spacing:.05em; margin-bottom:12px;">Client details</div>
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px;">
            ${field('Company', 'co', 'Company name', true)}
            ${field('Contact person', 'contact', 'Full name')}
            ${field('Email', 'email', 'name@company.com')}
            ${field('Phone', 'phone', '+91 ·····')}
            ${field('Delivery by', 'delivery', 'e.g. 15 Dec 2025')}
          </div>
          <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;">
            <div style="font-size:12px; font-weight:800; text-transform:uppercase; letter-spacing:.05em;">Items <span data-qcount style="color:var(--c-muted);">${q.items.length}</span></div>
            ${caps.approve ? `<span style="font-size:10px; font-weight:600; color:var(--c-accent);">✓ Prices editable</span>` : `<span style="font-size:10px; color:var(--c-muted);">List prices (locked)</span>`}
          </div>
          <div data-qitems>${itemRows()}</div>
          <div style="margin-top:22px; padding-top:18px; border-top:1px solid var(--c-line);">
            <div style="font-size:12px; font-weight:800; text-transform:uppercase; letter-spacing:.05em; margin-bottom:12px;">Quotation branding</div>
            <div style="display:flex; gap:14px; align-items:stretch;">
              <div data-qlogo style="cursor:pointer; width:104px; flex:none; border-radius:12px; border:1px dashed ${q.logo ? 'var(--c-accent)' : 'var(--c-line)'}; background:${q.logo ? 'rgba(23,155,142,.07)' : 'rgba(255,255,255,.7)'}; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px; text-align:center; padding:10px;">
                ${q.logo
                  ? `<span style="font-size:18px; color:var(--c-accent);">✓</span><span style="font-size:10px; font-weight:700; color:#127d72; word-break:break-all; line-height:1.3;">${q.logo}</span><span style="font-size:9px; color:var(--c-muted);">tap to replace</span>`
                  : `<span style="font-size:18px; color:var(--c-muted);">⬆</span><span style="font-size:10px; color:var(--c-muted); line-height:1.3;">Client brand<br>logo</span>`}
              </div>
              <div style="flex:1; min-width:0;">
                <div style="font-size:11px; font-weight:600; color:var(--c-slate); margin-bottom:8px;">Quotation colour theme</div>
                <div style="display:grid; grid-template-columns:repeat(2,1fr); gap:8px;">
                  ${quoteThemes.map((t, ti) => `<div data-qtheme="${ti}" style="cursor:pointer; display:flex; align-items:center; gap:8px; padding:8px 10px; border-radius:10px; background:${ti === q.theme ? 'rgba(42,43,106,.07)' : 'rgba(255,255,255,.6)'}; border:1.5px solid ${ti === q.theme ? 'var(--c-indigo)' : 'var(--c-line)'};">
                    <span style="display:flex; gap:3px; flex:none;"><span style="width:15px; height:15px; border-radius:4px; background:linear-gradient(135deg,${t.h[0]},${t.h[1]});"></span><span style="width:15px; height:15px; border-radius:4px; background:${t.a};"></span></span>
                    <span style="font-size:11px; font-weight:${ti === q.theme ? '700' : '500'}; color:${ti === q.theme ? 'var(--c-indigo)' : 'var(--c-slate)'}; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${t.name}</span>
                  </div>`).join('')}
                </div>
              </div>
            </div>
          </div>
          <div style="margin-top:20px;">
            <div style="font-size:11px; font-weight:600; color:var(--c-slate); margin-bottom:5px;">Branding / special requirements</div>
            <textarea data-qf="notes" placeholder="e.g. Logo in white on navy, individual gift boxing, delivery split across 2 cities…" style="${IN} height:60px; padding:9px 12px; resize:none; line-height:1.5;">${esc(q.notes)}</textarea>
          </div>
          <div style="display:grid; grid-template-columns:1fr 1.4fr; gap:10px; margin-top:14px;">
            <div><div style="font-size:11px; font-weight:600; color:var(--c-slate); margin-bottom:5px;">Discount %</div><input data-qf="disc" value="${q.disc || 0}" style="${IN}"></div>
            <div><div style="font-size:11px; font-weight:600; color:var(--c-slate); margin-bottom:5px;">Payment terms</div><input data-qf="terms" value="${esc(q.terms)}" style="${IN}"></div>
          </div>
          ${wasApproved ? `<div style="font-size:11px; color:#b5801e; background:rgba(224,163,59,.12); border:1px solid rgba(224,163,59,.28); border-radius:9px; padding:9px 11px; margin-top:14px;">Editing returns this quotation to <strong>Draft</strong> — re-approval required before download.</div>` : ''}
        </div>
        <div style="padding:14px 18px; border-top:1px solid var(--c-line); background:rgba(245,246,251,.7); flex:none;">
          <div style="display:flex; align-items:center; justify-content:space-between;">
            <div style="font-size:12px; font-weight:700; color:var(--c-slate);">Quotation total<span data-disclabel>${q.disc ? ` <span style="font-weight:500; color:var(--c-muted);">(${q.disc}% off)</span>` : ''}</span></div>
            <div data-qtotal style="font-size:23px; font-weight:800; color:var(--c-indigo);">₹ ${this.quoteTotal(q).toLocaleString('en-IN')}</div>
          </div>
        </div>
      </div>`;

    const wireCards = () => {
      body.querySelectorAll('[data-padd]').forEach((b) => b.onclick = () => {
        const pi = +b.getAttribute('data-padd'); const p = this.data.products[pi];
        q.items.push({ name: p.name, qty: p.moq || 100, price: p.price, _pid: pi });
        body.querySelector('[data-cards]').innerHTML = catalogCards(); wireCards();
        renderRightPanel();
      });
    };
    const wireRight = () => {
      body.querySelectorAll('[data-qi-qty]').forEach((inp) => inp.oninput = (e) => { q.items[+inp.getAttribute('data-qi-qty')].qty = +e.target.value || 0; recalc(); });
      body.querySelectorAll('[data-qinc]').forEach((b) => b.onclick = () => { q.items[+b.getAttribute('data-qinc')].qty += 10; renderRightPanel(); });
      body.querySelectorAll('[data-qdec]').forEach((b) => b.onclick = () => { const it = q.items[+b.getAttribute('data-qdec')]; it.qty = Math.max(0, it.qty - 10); renderRightPanel(); });
      body.querySelectorAll('[data-qi-price]').forEach((inp) => inp.oninput = (e) => { const it = q.items[+inp.getAttribute('data-qi-price')]; it.price = +e.target.value || 0; it._edited = true; recalc(); });
      body.querySelectorAll('[data-qi-del]').forEach((b) => b.onclick = () => { q.items.splice(+b.getAttribute('data-qi-del'), 1); body.querySelector('[data-cards]').innerHTML = catalogCards(); wireCards(); renderRightPanel(); });
      body.querySelectorAll('[data-qf]').forEach((inp) => inp.oninput = (e) => { const k = inp.getAttribute('data-qf'); q[k] = (k === 'disc') ? (+e.target.value || 0) : e.target.value; if (k === 'disc') recalc(); });
      const lg = body.querySelector('[data-qlogo]'); if (lg) lg.onclick = () => { q.logo = q.logo ? '' : 'brand-logo.png'; renderRightPanel(); };
      body.querySelectorAll('[data-qtheme]').forEach((b) => b.onclick = () => { q.theme = +b.getAttribute('data-qtheme'); renderRightPanel(); });
    };
    const renderRightPanel = () => { body.querySelector('[data-rightpanel]').innerHTML = renderRight(); wireRight(); };

    const wireLeft = () => {
      const sb = body.querySelector('[data-psearch]');
      if (sb) sb.oninput = (e) => { search = e.target.value; body.querySelector('[data-cards]').innerHTML = catalogCards(); wireCards(); };
      body.querySelectorAll('[data-cat]').forEach((c) => c.onclick = () => {
        activeCat = c.getAttribute('data-cat');
        body.querySelector('[data-leftpanel]').innerHTML = renderLeft();
        wireLeft(); wireCards();
      });
    };
    const render = () => {
      body.innerHTML = `<div style="display:grid; grid-template-columns:1.45fr 1fr; height:100%; min-height:0;">
        <div data-leftpanel style="min-width:0; overflow:hidden;">${renderLeft()}</div>
        <div data-rightpanel style="min-width:0; overflow:hidden;">${renderRight()}</div>
      </div>`;
      wireLeft(); wireCards(); wireRight();
    };

    this._modalSave = () => {
      if (isNew) { this.data.quotations.unshift(q); }
      else { if (wasApproved) q.status = 'Draft'; this.data.quotations[idx] = q; }
      this.renderView();
    };
    modal.style.display = 'flex';
    render();
  }
  openAccess(idx) {
    const q = this.data.quotations[idx];
    const caps = this.roleCaps();
    this.resetModalCard();
    const modal = this.wrap.querySelector('[data-modal]');
    modal.querySelector('[data-modal-title]').textContent = 'Download access · ' + q.id;
    const body = modal.querySelector('[data-modal-body]');
    const render = () => {
      const locked = !(q.status === 'Approved' || q.status === 'Sent');
      body.innerHTML = `
        ${locked
          ? `<div style="font-size:11.5px; color:#b5801e; background:rgba(224,163,59,.12); border:1px solid rgba(224,163,59,.28); border-radius:10px; padding:10px 12px;">This quotation is <strong>${q.status}</strong>. Granted users can download only after Super Admin approval.</div>`
          : `<div style="font-size:11.5px; color:#127d72; background:rgba(23,155,142,.1); border:1px solid rgba(23,155,142,.22); border-radius:10px; padding:10px 12px;">Approved — granted users below can download the PDF.</div>`}
        <div><div style="font-size:12px; font-weight:700; color:var(--c-slate); margin-bottom:8px;">Authorized to download</div>
          <div style="display:flex; flex-direction:column; gap:8px;">${q.recipients.map((r, j) => `<div style="display:flex; align-items:center; gap:12px; padding:10px 12px; border-radius:11px; background:rgba(255,255,255,.7); border:1px solid var(--c-line);"><div style="flex:1;"><div style="font-size:13px; font-weight:600;">${r.email}</div><div style="font-size:11px; color:var(--c-muted);">${r.role}</div></div>${caps.access ? `<span data-acc-tog="${j}" style="cursor:pointer;">${this.toggle(r.on)}</span>` : `<span style="font-size:11px; color:var(--c-muted);">${r.on ? 'Granted' : 'No access'}</span>`}</div>`).join('')}</div>
          ${caps.access ? `<div style="display:flex; gap:8px; margin-top:10px;"><input data-admin-input data-acc-new placeholder="add email…" style="flex:1; height:40px; padding:0 12px; font-family:inherit; font-size:13px; border-radius:10px; background:rgba(255,255,255,.85); border:1px solid var(--c-line); outline:none;"><span data-acc-add style="cursor:pointer; font-size:13px; font-weight:700; color:#fff; padding:0 16px; height:40px; display:flex; align-items:center; border-radius:10px; background:linear-gradient(135deg,#2a2b6a,#3a3c98);">Grant</span></div>` : ''}</div>
        <div><div style="font-size:12px; font-weight:700; color:var(--c-slate); margin-bottom:8px;">Download history</div>${q.downloads.length ? q.downloads.map((d) => `<div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--c-line); font-size:12.5px;"><span>${d.who}</span><span style="color:var(--c-muted); font-family:'JetBrains Mono',monospace;">${d.when}</span></div>`).join('') : `<div style="font-size:12.5px; color:var(--c-muted);">No downloads yet.</div>`}</div>
      `;
      body.querySelectorAll('[data-acc-tog]').forEach((b) => b.onclick = () => { const r = q.recipients[+b.getAttribute('data-acc-tog')]; r.on = !r.on; render(); });
      const add = body.querySelector('[data-acc-add]'); if (add) add.onclick = () => { const v = body.querySelector('[data-acc-new]').value.trim(); if (!v) return; q.recipients.push({ email: v, role: 'Buyer', on: true }); render(); };
    };
    this._modalSave = () => this.renderView();
    modal.style.display = 'flex';
    render();
  }

  // ---------- COMPANIES ----------
  v_companies() {
    const head = `<div style="display:grid; grid-template-columns:1.6fr .8fr .8fr .9fr 1fr; gap:14px; padding:0 14px 12px; border-bottom:1px solid var(--c-line); font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:.05em; text-transform:uppercase; color:var(--c-muted);"><span>Company</span><span>Model</span><span>Employees</span><span>Default pts</span><span></span></div>`;
    const rows = this.data.companies.map((c, i) => `<div style="display:grid; grid-template-columns:1.6fr .8fr .8fr .9fr 1fr; gap:14px; padding:14px; border-bottom:1px solid var(--c-line); align-items:center; font-size:13px;">
      <span style="display:flex; align-items:center; gap:11px;"><span style="width:36px; height:36px; flex:none; border-radius:10px; background:linear-gradient(135deg,#2a2b6a,#179b8e); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:12px;">${c.name.slice(0, 2).toUpperCase()}</span><strong>${c.name}</strong></span>
      <span>${this.badge(c.model)}</span>
      <span style="font-weight:700;">${c.employees.toLocaleString('en-IN')}</span>
      <span>${c.pts.toLocaleString('en-IN')} pts</span>
      <span style="display:flex; gap:8px; justify-content:flex-end;">${c.portal ? `<span data-openportal="${i}" style="cursor:pointer; font-size:11px; font-weight:600; color:var(--c-indigo); padding:7px 12px; border-radius:9px; background:rgba(42,43,106,.07);">Manage portal</span>` : `<span data-makeportal="${i}" style="cursor:pointer; font-size:11px; font-weight:600; color:#fff; padding:7px 12px; border-radius:9px; background:var(--c-accent);">Create portal</span>`}</span>
    </div>`).join('');
    return this.card(head + rows);
  }
  after_companies() {
    this.setPrimary('Add Company', () => this.openForm('Add company', [['name', 'Company name', ''], ['employees', 'No. of employees', ''], ['pts', 'Default points', '']], (vals) => {
      this.data.companies.push({ name: vals.name || 'New Co', model: 'Points', employees: +vals.employees || 0, pts: +vals.pts || 0, portal: false }); this.renderView();
    }));
    const host = this.wrap.querySelector('[data-view]');

    host.querySelectorAll('[data-smargin-inc]').forEach((b) => b.addEventListener('click', () => this.sellerMargin(+b.getAttribute('data-smargin-inc'), 5)));

  sellerMargin(i, d) { const s = this.data.sellers[i]; s.margin = Math.max(0, Math.min(90, s.margin + d)); const el = this.wrap.querySelector(`[data-smargin="${i}"]`); if (el) el.textContent = s.margin + '%'; }
  openSeller(idx) {
    const s = this.data.sellers[idx];
    this.resetModalCard();
    const modal = this.wrap.querySelector('[data-modal]');
    const card = modal.querySelector('[data-modal-card]');
    card.style.width = '760px';
    modal.querySelector('[data-modal-title]').textContent = s.name + ' · products';
    const body = modal.querySelector('[data-modal-body]');
    const livePrice = (p) => Math.round(p * (1 + s.margin / 100));
    const render = () => {
      body.innerHTML = `
        <div style="display:flex; align-items:center; gap:12px; padding:12px 14px; border-radius:12px; background:rgba(42,43,106,.06); border:1px solid rgba(42,43,106,.12);">
          <div style="flex:1;"><div style="font-size:12.5px; font-weight:800;">Admin margin</div><div style="font-size:11px; color:var(--c-muted);">Applied to each seller cost to get the live price.</div></div>
          <span style="display:flex; align-items:center; gap:4px; background:#fff; border:1px solid var(--c-line); border-radius:10px; padding:4px;"><span data-mm-dec style="cursor:pointer; width:26px; height:26px; display:flex; align-items:center; justify-content:center; color:var(--c-slate); font-size:16px;">−</span><span data-mm style="min-width:46px; text-align:center; font-weight:800; font-size:14px;">${s.margin}%</span><span data-mm-inc style="cursor:pointer; width:26px; height:26px; display:flex; align-items:center; justify-content:center; color:var(--c-slate); font-size:15px;">+</span></span>
        </div>
        ${s.items.length ? s.items.map((it, j) => `<div style="display:flex; align-items:center; gap:13px; padding:12px 14px; border-radius:12px; background:rgba(255,255,255,.7); border:1px solid var(--c-line);">
          <span style="width:42px; height:42px; flex:none; border-radius:10px; background:repeating-linear-gradient(135deg,rgba(23,155,142,.07) 0 8px,rgba(23,155,142,.02) 8px 16px),linear-gradient(135deg,#e3efed,#daece9);"></span>
          <div style="flex:1; min-width:0;"><div style="font-size:13.5px; font-weight:700;">${it.name}</div><div style="font-size:11px; color:var(--c-muted); font-family:'JetBrains Mono',monospace;">${it.code} · cost ₹${it.price} → live ₹${livePrice(it.price)}</div></div>
          ${this.badge(it.status)}
          <span style="display:flex; gap:6px; flex:none;">
            ${it.status !== 'Live' && it.status !== 'Blocked' ? `<span data-iok="${j}" style="cursor:pointer; font-size:11px; font-weight:600; color:#fff; padding:6px 10px; border-radius:8px; background:var(--c-accent);">Approve</span>` : ''}
            ${it.status === 'In review' ? `<span data-ichg="${j}" style="cursor:pointer; font-size:11px; font-weight:600; color:#b5801e; padding:6px 10px; border-radius:8px; background:rgba(224,163,59,.14);">Request changes</span>` : ''}
            ${it.status === 'Blocked' ? `<span data-iunblock="${j}" style="cursor:pointer; font-size:11px; font-weight:600; color:#127d72; padding:6px 10px; border-radius:8px; background:rgba(23,155,142,.12);">Unblock</span>` : `<span data-iblock="${j}" style="cursor:pointer; font-size:11px; font-weight:600; color:#c0413c; padding:6px 10px; border-radius:8px; background:rgba(224,82,77,.1);">Block</span>`}
          </span>
        </div>`).join('') : `<div style="padding:30px; text-align:center; color:var(--c-muted); font-size:13px;">This seller has no products yet.</div>`}
      `;
      body.querySelector('[data-mm-inc]').onclick = () => { s.margin = Math.min(90, s.margin + 5); render(); };
      body.querySelector('[data-mm-dec]').onclick = () => { s.margin = Math.max(0, s.margin - 5); render(); };
      body.querySelectorAll('[data-iok]').forEach((b) => b.onclick = () => { s.items[+b.getAttribute('data-iok')].status = 'Live'; render(); });
      body.querySelectorAll('[data-ichg]').forEach((b) => b.onclick = () => { s.items[+b.getAttribute('data-ichg')].status = 'Changes requested'; render(); });
      body.querySelectorAll('[data-iblock]').forEach((b) => b.onclick = () => { s.items[+b.getAttribute('data-iblock')].status = 'Blocked'; render(); });
      body.querySelectorAll('[data-iunblock]').forEach((b) => b.onclick = () => { s.items[+b.getAttribute('data-iunblock')].status = 'In review'; render(); });
    };
    this._modalSave = () => this.renderView();
    modal.style.display = 'flex';
    render();
  }

      else if (x.status === 'Approved') actions = `<span data-custblock="${i}" style="cursor:pointer; font-size:11px; font-weight:600; color:#c0413c; padding:7px 12px; border-radius:9px; background:rgba(224,82,77,.1);">Block</span>`;
      else actions = `<span data-custok="${i}" style="cursor:pointer; font-size:11px; font-weight:600; color:#127d72; padding:7px 12px; border-radius:9px; background:rgba(23,155,142,.12);">Approve</span>`;

        ? `<span style="font-size:11px; font-weight:700; color:#1a8f5a;">✓ Download &amp; quote</span>`

          ? `<span style="font-size:11px; font-weight:700; color:#c0413c;">✕ Browse only</span>`

    host.querySelectorAll('[data-custblock]').forEach((b) => b.addEventListener('click', () => { this.data.customers[+b.getAttribute('data-custblock')].status = 'Blocked'; this.renderView(); }));
  }

  // ---------- BRAND THEMING ----------
  brandPalettes = [
    { name: 'Navy & Teal', p: ['#2a2b6a', '#3a3c98', '#149b8e', '#13b89f', '#eef0f8'] },
    { name: 'Midnight Gold', p: ['#1a1a2e', '#2d2d4e', '#b0823a', '#d2a043', '#f8f4ec'] },
    { name: 'Deep Indigo', p: ['#1e1b4b', '#312e81', '#4143b0', '#5a5cd0', '#ede9fe'] },
    { name: 'Forest & Stone', p: ['#1a3329', '#2d5a46', '#5a7c3a', '#82a85c', '#f0f4ec'] },
  ];
  brandTargets = { catalogue: 0, quotation: 0, dashboard: 2, email: 0 };
  brandTarget = 'catalogue';
  v_branding() {
    const palettes = this.brandPalettes;
    const targets = [
      { k: 'catalogue', t: 'Catalogues', d: 'Product catalogue PDFs & the online catalogue' },
      { k: 'quotation', t: 'Quotations', d: 'Quotation PDFs sent to clients' },
      { k: 'dashboard', t: 'Company Dashboards', d: 'Branded company & employee portals' },
      { k: 'email', t: 'Email Templates', d: 'Transactional & marketing emails' },
    ];
    const target = this.brandTarget;
    const sel = this.brandTargets[target] || 0;
    const pal = palettes[sel];
    const cur = targets.find((t) => t.k === target);

    const tabs = `<div data-btargets style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:18px;">${targets.map((t) => {
      const on = t.k === target;
      return `<span data-btarget="${t.k}" style="cursor:pointer; display:flex; flex-direction:column; gap:2px; padding:11px 16px; border-radius:13px; background:${on ? 'linear-gradient(135deg,#2a2b6a,#3a3c98)' : 'rgba(255,255,255,.6)'}; border:1px solid ${on ? 'transparent' : 'var(--c-line)'}; min-width:150px;">
        <span style="font-size:13px; font-weight:700; color:${on ? '#fff' : 'var(--c-ink)'};">${t.t}</span>
        <span style="font-size:10.5px; color:${on ? 'rgba(255,255,255,.7)' : 'var(--c-muted)'};">${palettes[this.brandTargets[t.k] || 0].name}</span>
      </span>`;
    }).join('')}</div>`;

    const swatches = palettes.map((p, i) => `<div data-bpal="${i}" style="cursor:pointer; display:flex; align-items:center; gap:12px; padding:13px 14px; border-radius:13px; background:${i === sel ? 'rgba(42,43,106,.07)' : 'rgba(255,255,255,.5)'}; border:1.5px solid ${i === sel ? 'var(--c-indigo)' : 'var(--c-line)'};">
      <div style="display:flex; gap:4px;">${p.p.map((c) => `<div style="width:22px; height:22px; border-radius:6px; background:${c};"></div>`).join('')}</div>
      <span style="font-size:13px; font-weight:${i === sel ? '700' : '500'}; color:${i === sel ? 'var(--c-indigo)' : 'var(--c-slate)'}; flex:1;">${p.name}</span>
      ${i === sel ? '<span style="font-size:11px; font-weight:700; color:var(--c-accent);">Active ✓</span>' : ''}
    </div>`).join('');

    const left = this.card(`<div style="font-size:15px; font-weight:800; margin-bottom:3px;">Palette for ${cur.t}</div><div style="font-size:12px; color:var(--c-muted); margin-bottom:14px;">${cur.d}</div><div style="display:flex; flex-direction:column; gap:8px;" data-bswatches>${swatches}</div>`);
    const preview = `<div><div style="font-size:12px; font-weight:700; color:var(--c-slate); text-transform:uppercase; letter-spacing:.06em; margin-bottom:12px;">${cur.t} preview</div>${this.brandPreview(target, pal)}</div>`;
    return tabs + `<div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; align-items:start;">${left}${preview}</div>`;
  }
  brandPreview(target, pal) {
    if (target === 'catalogue') {
      const tile = (n, pr) => `<div style="background:#fff; border:1px solid rgba(0,0,0,.06); border-radius:10px; overflow:hidden;"><div style="height:62px; background:${pal.p[4]}; display:flex; align-items:center; justify-content:center; color:${pal.p[2]}; font-size:18px;">🖼</div><div style="padding:8px 10px;"><div style="font-size:11px; font-weight:700; color:${pal.p[0]};">${n}</div><div style="font-size:11px; font-weight:800; color:${pal.p[2]}; margin-top:2px;">${pr}</div></div></div>`;
      return `<div style="background:#fff; border:1px solid var(--c-line); border-radius:16px; overflow:hidden; box-shadow:0 12px 30px rgba(34,36,90,.1);">
        <div style="background:linear-gradient(135deg,${pal.p[0]},${pal.p[1]}); padding:20px 24px;"><div style="font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:.12em; text-transform:uppercase; color:${pal.p[3]}; margin-bottom:4px;">PRODUCT CATALOGUE</div><div style="font-size:18px; font-weight:800; color:#fff;">Drinkware · 2026</div></div>
        <div style="padding:18px 20px; display:grid; grid-template-columns:repeat(3,1fr); gap:10px;">${tile('Steel Bottle', '₹ 540')}${tile('Coffee Mug', '₹ 240')}${tile('Tumbler', '₹ 410')}</div>
      </div>`;
    }
    if (target === 'dashboard') {
      return `<div style="background:#fff; border:1px solid var(--c-line); border-radius:16px; overflow:hidden; box-shadow:0 12px 30px rgba(34,36,90,.1); display:flex; min-height:230px;">
        <div style="width:78px; flex:none; background:linear-gradient(180deg,${pal.p[0]},${pal.p[1]}); padding:16px 10px; display:flex; flex-direction:column; gap:8px;">${['🏠', '📄', '👥', '📦'].map((i, k) => `<span style="width:100%; height:30px; border-radius:8px; background:${k === 0 ? 'rgba(255,255,255,.18)' : 'transparent'}; color:#fff; display:flex; align-items:center; justify-content:center; font-size:13px;">${i}</span>`).join('')}</div>
        <div style="flex:1; padding:18px 20px; background:${pal.p[4]};">
          <div style="font-size:14px; font-weight:800; color:${pal.p[0]}; margin-bottom:12px;">Company store</div>
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">${[1, 2].map(() => `<div style="background:#fff; border-radius:10px; padding:12px;"><div style="font-size:9px; text-transform:uppercase; color:#9295b6;">Points used</div><div style="font-size:19px; font-weight:800; color:${pal.p[2]};">18.4L</div></div>`).join('')}</div>
          <div style="height:8px; border-radius:999px; background:#fff; margin-top:14px; overflow:hidden;"><div style="height:100%; width:62%; background:linear-gradient(90deg,${pal.p[0]},${pal.p[2]});"></div></div>
        </div>
      </div>`;
    }
    if (target === 'email') {
      return `<div style="background:#fff; border:1px solid var(--c-line); border-radius:16px; overflow:hidden; box-shadow:0 12px 30px rgba(34,36,90,.1);">
        <div style="background:linear-gradient(135deg,${pal.p[0]},${pal.p[1]}); padding:24px; text-align:center;"><div style="font-size:16px; font-weight:800; color:#fff;">Supreme International</div></div>
        <div style="padding:22px 24px;"><div style="font-size:14px; font-weight:700; color:${pal.p[0]}; margin-bottom:8px;">Your quotation is ready</div><div style="font-size:12px; color:#5b5d7a; line-height:1.6; margin-bottom:16px;">Hi Rohan, your quotation QT-2041 has been approved and is ready to download.</div><span style="display:inline-block; font-size:12px; font-weight:700; color:#fff; padding:11px 20px; border-radius:10px; background:${pal.p[2]};">Download PDF</span></div>
      </div>`;
    }
    return `<div style="background:#fff; border:1px solid var(--c-line); border-radius:16px; overflow:hidden; box-shadow:0 12px 30px rgba(34,36,90,.1);">
      <div style="background:linear-gradient(135deg,${pal.p[0]},${pal.p[1]}); padding:20px 24px; display:flex; align-items:center; justify-content:space-between;">
        <div><div style="font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:.12em; text-transform:uppercase; color:${pal.p[3]}; margin-bottom:4px;">COMMERCIAL QUOTATION</div><div style="font-size:18px; font-weight:800; color:#fff;">QT-2041</div></div>
        <div style="width:36px; height:36px; border-radius:10px; background:rgba(255,255,255,.15); display:flex; align-items:center; justify-content:center; color:#fff; font-size:16px;">📄</div>
      </div>
      <div style="padding:20px 24px;">
        <div style="display:flex; justify-content:space-between; margin-bottom:16px;"><div><div style="font-size:10px; text-transform:uppercase; letter-spacing:.08em; color:var(--c-muted); margin-bottom:4px;">Prepared for</div><div style="font-weight:700; font-size:14px;">L&T Construction</div></div><div style="text-align:right;"><div style="font-size:10px; text-transform:uppercase; letter-spacing:.08em; color:var(--c-muted); margin-bottom:4px;">Date</div><div style="font-weight:700; font-size:14px;">24 Jun 2025</div></div></div>
        <div style="background:${pal.p[4]}; border-radius:10px; padding:14px;">
          <div style="display:flex; justify-content:space-between; font-size:12px; font-weight:600; margin-bottom:8px; color:${pal.p[0]};"><span>Canvas Laptop Backpack × 200</span><span>₹ 2,36,000</span></div>
          <div style="display:flex; justify-content:space-between; font-size:12px; font-weight:600; color:${pal.p[0]};"><span>Insulated Steel Bottle × 500</span><span>₹ 2,60,000</span></div>
          <div style="border-top:1px solid rgba(0,0,0,.1); margin-top:10px; padding-top:10px; display:flex; justify-content:space-between; font-size:14px; font-weight:800; color:${pal.p[0]};"><span>Total (5% disc.)</span><span>₹ 4,71,200</span></div>
        </div>
      </div>
    </div>`;
  }
  after_branding() {
    const host = this.wrap.querySelector('[data-view]');
    host.querySelectorAll('[data-btarget]').forEach((b) => b.addEventListener('click', () => { this.brandTarget = b.getAttribute('data-btarget'); this.renderView(); }));
    host.querySelectorAll('[data-bpal]').forEach((b) => b.addEventListener('click', () => { this.brandTargets[this.brandTarget] = +b.getAttribute('data-bpal'); this.renderView(); }));
    this.setPrimary('Apply Theme', () => { const btn = this.wrap.querySelector('[data-primary]'); this.toast(btn, '✓ Applied to ' + this.brandTarget); });
  }

  // ---------- MODAL ----------
  bindModal() {
    if (!this.wrap || this._mb) return; this._mb = true;
    const modal = this.wrap.querySelector('[data-modal]');
    const close = () => { modal.style.display = 'none'; };
    this.wrap.querySelector('[data-modal-close]').addEventListener('click', close);
    this.wrap.querySelector('[data-modal-cancel]').addEventListener('click', close);
    modal.addEventListener('click', (e) => { if (e.target === modal) close(); });
    this.wrap.querySelector('[data-modal-save]').addEventListener('click', () => {
      const vals = {};
      modal.querySelectorAll('[data-mfield]').forEach((f) => { vals[f.getAttribute('data-mfield')] = f.value; });
      if (this._modalSave) this._modalSave(vals);
      close();
    });
  }
  openForm(title, fields, onSave) {
    this.resetModalCard();
    const modal = this.wrap.querySelector('[data-modal]');
    modal.querySelector('[data-modal-title]').textContent = title;
    modal.querySelector('[data-modal-body]').innerHTML = fields.map((f) => `<div><div style="font-size:12px; font-weight:600; color:var(--c-slate); margin-bottom:6px;">${f[1]}</div><input data-admin-input data-mfield="${f[0]}" value="${f[2] != null ? f[2] : ''}" style="width:100%; height:44px; padding:0 14px; font-family:inherit; font-size:14px; border-radius:12px; background:rgba(255,255,255,.85); border:1px solid var(--c-line); outline:none; transition:.15s;"></div>`).join('');
    this._modalSave = onSave;
    modal.style.display = 'flex';
    const first = modal.querySelector('[data-mfield]'); if (first) setTimeout(() => first.focus(), 50);
  }

  renderVals() { return { setWrap: this.setWrap }; }
}
</script>
</body>
</html>
