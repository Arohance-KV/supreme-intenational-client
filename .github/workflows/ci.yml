name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Non-blocking initially (lint not verified clean on this repo); typecheck + test are the gate.
      - run: npm run lint
        continue-on-error: true
      - run: npx tsc --noEmit
      - run: npm test
      # next build intentionally omitted: needs runtime env and is slower/flakier than typecheck.
